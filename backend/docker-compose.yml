version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: reportsdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  api:
    build: .
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/reportsdb
      JWT_SECRET: change_me
      BASE_URL: http://localhost:4000
    ports:
      - "4000:4000"
    depends_on:
      - db
volumes:
  pgdata:

